<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Estacionamento ACME</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1> Estacionamento ACME</h1>
</header>

<nav>
  <button class="active" onclick="showSection('veiculos')">Veículos</button>
  <button onclick="showSection('estadias')">Estadias</button>
</nav>

<main>
  <section id="veiculos" class="active">
    <h2>Gerenciar Veículos</h2>

    <div id="msg-veiculo"></div>

    <div class="card">
      <h3 id="form-veiculo-titulo" style="margin-bottom:12px">Cadastrar Veículo</h3>
      <div class="form-grid">
        <label>Placa *
          <input id="v-placa" placeholder="ABC-1234" />
        </label>
        <label>Modelo *
          <input id="v-modelo" placeholder="Gol, Civic..." />
        </label>
        <label>Cor
          <input id="v-cor" placeholder="Branco" />
        </label>
        <label>Ano
          <input id="v-ano" type="number" placeholder="2020" />
        </label>
      </div>
      <input type="hidden" id="v-id" />
      <button class="btn btn-primary" onclick="salvarVeiculo()">Salvar</button>
      <button class="btn" style="background:#aaa;color:white;margin-left:8px" onclick="cancelarVeiculo()">Cancelar</button>
    </div>

    <div class="card">
      <h3 style="margin-bottom:12px">Veículos Cadastrados</h3>
      <table>
        <thead>
          <tr><th>ID</th><th>Placa</th><th>Modelo</th><th>Cor</th><th>Ano</th><th>Estadias</th><th>Ações</th></tr>
        </thead>
        <tbody id="tabela-veiculos"></tbody>
      </table>
    </div>
  </section>

  <section id="estadias">
    <h2>Gerenciar Estadias</h2>

    <div id="msg-estadia"></div>

    <div class="card">
      <h3 id="form-estadia-titulo" style="margin-bottom:12px">Registrar Entrada</h3>
      <div class="form-grid">
        <label>Veículo *
          <select id="e-veiculoId"></select>
        </label>
        <label>Valor por Hora (R$) *
          <input id="e-valorHora" type="number" step="0.01" placeholder="10.00" />
        </label>
        <label id="e-saida-label" style="display:none">Saída
          <input id="e-saida" type="datetime-local" />
        </label>
      </div>
      <input type="hidden" id="e-id" />
      <button class="btn btn-primary" onclick="salvarEstadia()">Salvar</button>
      <button class="btn" style="background:#aaa;color:white;margin-left:8px" onclick="cancelarEstadia()">Cancelar</button>
    </div>

    <div class="card">
      <h3 style="margin-bottom:12px">Estadias Registradas</h3>
      <table>
        <thead>
          <tr><th>ID</th><th>Veículo</th><th>Entrada</th><th>Saída</th><th>R$/Hora</th><th>Total</th><th>Status</th><th>Ações</th></tr>
        </thead>
        <tbody id="tabela-estadias"></tbody>
      </table>
    </div>
  </section>
</main>
<script src="script.js"></script>
</body>
</html>
